name: Build macOS arm64

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        run: brew install qt@6

      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6)
          cmake --build build
        env:
          MACOSX_DEPLOYMENT_TARGET: '13.0'

      - name: Deploy Qt
        run: $(brew --prefix qt@6)/bin/macdeployqt build/AudioFlow3.app -verbose=2

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - build/AudioFlow3.app

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version)" >> "$GITHUB_OUTPUT"

      - name: Create zip
        run: ditto -c -k --sequesterRsrc --keepParent build/AudioFlow3.app "AudioFlow3-${{ steps.version.outputs.VERSION }}-macos-arm64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: AudioFlow3-${{ steps.version.outputs.VERSION }}-macos-arm64
          path: AudioFlow3-${{ steps.version.outputs.VERSION }}-macos-arm64.zip
          if-no-files-found: error
          archive: false
